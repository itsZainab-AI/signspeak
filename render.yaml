services:
  - type: web
    name: signspeak
    env: python
    buildCommand: "apt-get update && apt-get install -y tesseract-ocr && pip install -r requirements.txt"
    startCommand: "uvicorn src.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DEPLOY_MODE
        value: hosted
      - key: GROQ_API_KEY
        sync: false
